name: Smoke

# Protects main by machinery, not memory: every push and PR runs the full
# Playwright smoke suite in BOTH dev and preview (production-build) modes.
# GitHub's runners can install Chromium, so this is the real in-browser smoke.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        mode: [dev, preview]
    name: smoke (${{ matrix.mode }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests (${{ matrix.mode }})
        run: npm test
        env:
          SMOKE_MODE: ${{ matrix.mode }}

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.mode }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
