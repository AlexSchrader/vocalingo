name: smoke

# Protect main by machinery, not memory. PRs are checked via the pull_request
# event; main is re-checked on merge. The GitHub runner installs Chromium, so
# this is the full in-browser smoke in both dev and preview (production-build)
# modes.

on:
  push: { branches: [main] }
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run test:unit         # FSRS + migration logic (node:test)
      - run: npx playwright install --with-deps chromium
      - run: npm test                  # dev smoke
      - run: npm run build
      - run: npm test                  # preview smoke
        env: { SMOKE_MODE: preview }
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
          if-no-files-found: ignore
